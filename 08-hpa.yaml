# Horizontal Pod Autoscaler — scales replicas based on CPU & memory
# Requires: metrics-server installed in cluster
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: litellm-hpa
  namespace: litellm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: litellm
  minReplicas: 3       # Never scale below 3 (multi-AZ minimum)
  maxReplicas: 20      # Adjust based on your node capacity

  metrics:
    # Scale up when average CPU > 65%
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65

    # Scale up when average memory > 75%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60        # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 4                           # Add at most 4 pods per period
          periodSeconds: 60
        - type: Percent
          value: 50                          # Or 50% of current replicas
          periodSeconds: 60
      selectPolicy: Max                      # Use whichever adds more pods

    scaleDown:
      stabilizationWindowSeconds: 300       # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 2                           # Remove at most 2 pods per period
          periodSeconds: 120
