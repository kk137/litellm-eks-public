# ⚠️⚠️⚠️ CONTAINS PLACEHOLDERS (<YOUR_ACCOUNT_ID>) — DO NOT `kubectl apply` directly.
# Replace placeholders with real values first, or you will overwrite live config.
# Real account id: 345594601181. Check first: grep -nE "<YOUR|<REGION>" 01-serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-sa
  namespace: litellm
  annotations:
    # IRSA: bind this SA to the IAM role
    eks.amazonaws.com/role-arn: arn:aws:iam::<YOUR_ACCOUNT_ID>:role/litellm-irsa-role
    eks.amazonaws.com/sts-regional-endpoints: "true"
  labels:
    app.kubernetes.io/name: litellm
automountServiceAccountToken: true
