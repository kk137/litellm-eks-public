apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
  labels:
    app: litellm
    app.kubernetes.io/name: litellm
    app.kubernetes.io/version: "1.63.0"
spec:
  replicas: 3                    # Start with 3; HPA will scale up/down
  selector:
    matchLabels:
      app: litellm
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1                # One extra pod during rolling update
      maxUnavailable: 0          # Zero downtime: never kill before new is ready
  template:
    metadata:
      labels:
        app: litellm
        app.kubernetes.io/name: litellm
      annotations:
        # Prometheus scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
        # Force pod restart when ConfigMap changes
        checksum/config: "v1"
    spec:
      serviceAccountName: litellm-sa

      # ============================================================
      # Pod-level Security Context
      # ============================================================
      securityContext:
        runAsNonRoot: false
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault   # Restrict syscalls to known-good set

      # ============================================================
      # Node Affinity + Anti-Affinity
      # ============================================================
      affinity:
        # Only schedule on Karpenter-managed nodes (system NG reserved for controllers)
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: karpenter.sh/nodepool
                    operator: Exists
        podAntiAffinity:
          # Hard rule: never two pods on the same node
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: litellm
              topologyKey: kubernetes.io/hostname
          # Soft rule: prefer different AZs
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: litellm
                topologyKey: topology.kubernetes.io/zone

      # ============================================================
      # Topology Spread: evenly distribute across AZs
      # ============================================================
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: litellm

      # Graceful shutdown: allow in-flight requests to complete
      terminationGracePeriodSeconds: 60

      # DNS tuning (reduce ndots to speed up resolution)
      dnsConfig:
        options:
          - name: ndots
            value: "2"

      # ============================================================
      # Main Container
      # ============================================================
      containers:
        - name: litellm
          # Pin to a specific version — never use :latest or moving tags in production
          image: ghcr.io/berriai/litellm-database:v1.84.3
          imagePullPolicy: IfNotPresent

          args:
            - "--config"
            - "/app/config/config.yaml"
            - "--port"
            - "4000"
            - "--num_workers"
            - "2"              # Match CPU request (2 vCPU = 2 workers)

          ports:
            - name: http
              containerPort: 4000
              protocol: TCP

          # ============================================================
          # Resources: requests=guaranteed, limits=max burst
          # num_workers should equal CPU request (in cores)
          # ============================================================
          resources:
            requests:
              cpu: "2000m"     # 2 vCPU guaranteed
              memory: "4Gi"
            limits:
              cpu: "4000m"     # 4 vCPU burst
              memory: "8Gi"

          # ============================================================
          # Container-level Security Context
          # ============================================================
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL          # Drop all Linux capabilities

          # ============================================================
          # Probes
          # ============================================================
          # Startup probe: allows up to 5 min for cold start
          startupProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5

          # Liveness: restart pod if it hangs
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          # Readiness: remove from LB if not ready
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # ============================================================
          # Environment — secrets injected from External Secrets Operator
          # ============================================================
          envFrom:
            - secretRef:
                name: litellm-secrets

          env:
            - name: LITELLM_LOG
              value: "INFO"
            - name: SEARXNG_API_BASE
              value: "http://searxng:8080"
            - name: PRISMA_BINARY_CACHE_DIR
              value: "/tmp/prisma"
            - name: HOME
              value: "/tmp"
            - name: LITELLM_MIGRATION_DIR
              value: "/tmp/migrations"
            # SSO via Cognito OIDC (GENERIC_CLIENT_ID/SECRET injected via envFrom)
            - name: GENERIC_AUTHORIZATION_ENDPOINT
              value: "https://litellm-<YOUR_ACCOUNT_ID>.auth.us-east-1.amazoncognito.com/oauth2/authorize"
            - name: GENERIC_TOKEN_ENDPOINT
              value: "https://litellm-<YOUR_ACCOUNT_ID>.auth.us-east-1.amazoncognito.com/oauth2/token"
            - name: GENERIC_USERINFO_ENDPOINT
              value: "https://litellm-<YOUR_ACCOUNT_ID>.auth.us-east-1.amazoncognito.com/oauth2/userInfo"
            - name: PROXY_BASE_URL
              value: "https://litellm.<YOUR_DOMAIN>"
            - name: GENERIC_CLIENT_STATE
              value: "litellm-sso"
            - name: AUTO_REDIRECT_UI_LOGIN_TO_SSO
              value: "true"
            - name: GENERIC_ROLE_MAPPINGS_GROUP_CLAIM
              value: "cognito:groups"
            - name: GENERIC_ROLE_MAPPINGS_ROLES
              value: "{'proxy_admin': ['admin'], 'proxy_admin_viewer': ['viewer'], 'internal_user': ['users'], 'internal_user_viewer': ['user_viewer']}"
            - name: UI_USERNAME
              value: "admin"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # ============================================================
          # Volume Mounts
          # readOnlyRootFilesystem=true requires emptyDir for writable paths
          # ============================================================
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache

      # ============================================================
      # Volumes
      # ============================================================
      volumes:
        - name: litellm-config
          configMap:
            name: litellm-config
        - name: tmp
          emptyDir:
            sizeLimit: 500Mi
        - name: cache
          emptyDir:
            sizeLimit: 1Gi
