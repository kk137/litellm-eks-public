# Syncs secrets from AWS Secrets Manager into K8s Secret
# Prerequisites in Secrets Manager:
#   litellm/master-key, litellm/salt-key, litellm/database-url
#   litellm/redis-host, litellm/azure-api-key, litellm/azure-api-base
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: litellm-secrets
  namespace: litellm
spec:
  refreshInterval: 1h        # Auto-rotate: re-sync every hour
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: litellm-secrets    # K8s Secret name to create
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: litellm/master-key
    - secretKey: LITELLM_SALT_KEY
      remoteRef:
        key: litellm/salt-key
    - secretKey: DATABASE_URL
      remoteRef:
        key: litellm/database-url
    - secretKey: REDIS_HOST
      remoteRef:
        key: litellm/redis-host
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: litellm/redis-password
    - secretKey: AZURE_API_KEY
      remoteRef:
        key: litellm/azure-api-key
    - secretKey: AZURE_API_BASE
      remoteRef:
        key: litellm/azure-api-base
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: litellm/gemini-api-key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: litellm/openai-api-key
