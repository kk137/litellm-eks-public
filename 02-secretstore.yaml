# External Secrets Operator: ClusterSecretStore or SecretStore
# Requires: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: litellm
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1          # Replace with your region
      auth:
        jwt:
          serviceAccountRef:
            name: litellm-sa    # Uses IRSA for credential-free access
