# PodDisruptionBudget: ensures ≥2 pods available during node drains/updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: litellm-pdb
  namespace: litellm
spec:
  minAvailable: 2      # At least 2 pods must remain during disruptions
  selector:
    matchLabels:
      app: litellm
