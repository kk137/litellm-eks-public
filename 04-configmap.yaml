apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    # ============================================================
    # Model List — add/remove providers as needed
    # ============================================================
    model_list:
      # ── AWS Bedrock Claude (IRSA, no API key needed) ──
      - model_name: claude-opus-4-8
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-8
          aws_region_name: us-east-1
          stream_timeout: 900
          timeout: 900
      - model_name: claude-opus-4-7
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-7
          aws_region_name: us-east-1
          stream_timeout: 900
          timeout: 900
      - model_name: claude-opus-4-6
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-6-v1
          aws_region_name: us-east-1
          stream_timeout: 900
          timeout: 900
      - model_name: claude-opus-4-5
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-5-20251101-v1:0
          aws_region_name: us-east-1
          stream_timeout: 900
          timeout: 900
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-6
          aws_region_name: us-east-1
          stream_timeout: 900
          timeout: 900
      # 1M context variant — enabled via anthropic-beta header
      - model_name: claude-sonnet-4-6[1m]
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-6
          aws_region_name: us-east-1
          stream_timeout: 900
          timeout: 900
          extra_headers:
            anthropic-beta: "context-1m-2025-08-07"
        model_info:
          max_input_tokens: 1000000
          max_output_tokens: 128000
      - model_name: claude-haiku-4-5
        litellm_params:
          model: bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0
          aws_region_name: us-east-1
          # Haiku 4.5 不支持 extended thinking，丢弃该参数避免 400
          drop_params: true
          additional_drop_params: ["thinking"]

      # ── AWS Bedrock Nova ──
      - model_name: bedrock-nova-premier
        litellm_params:
          model: bedrock/us.amazon.nova-premier-v1:0
          aws_region_name: us-east-1
      - model_name: bedrock-nova-pro
        litellm_params:
          model: bedrock/us.amazon.nova-pro-v1:0
          aws_region_name: us-east-1
      - model_name: bedrock-nova-lite
        litellm_params:
          model: bedrock/us.amazon.nova-lite-v1:0
          aws_region_name: us-east-1
      - model_name: bedrock-nova-micro
        litellm_params:
          model: bedrock/us.amazon.nova-micro-v1:0
          aws_region_name: us-east-1

      # ── Google Gemini (API Key from Secrets Manager) ──
      - model_name: gemini-3.1-pro
        litellm_params:
          model: gemini/gemini-3.1-pro
          api_key: os.environ/GEMINI_API_KEY
      - model_name: gemini-3-flash
        litellm_params:
          model: gemini/gemini-3-flash
          api_key: os.environ/GEMINI_API_KEY

      # ── OpenAI GPT on Bedrock Mantle (Responses API) ──
      # Mantle's gpt-5.5/5.4 only expose /openai/v1/responses, NOT chat/completions.
      # Use openai/ provider + the /openai/v1 base: LiteLLM appends /responses.
      # Clients MUST call the proxy's /v1/responses endpoint (responses.create).
      - model_name: gpt-5.5
        litellm_params:
          model: openai/openai.gpt-5.5
          api_base: https://bedrock-mantle.us-east-2.api.aws/openai/v1
          api_key: os.environ/BEDROCK_MANTLE_API_KEY
      - model_name: gpt-5.4
        litellm_params:
          model: openai/openai.gpt-5.4
          api_base: https://bedrock-mantle.us-east-2.api.aws/openai/v1
          api_key: os.environ/BEDROCK_MANTLE_API_KEY
      # GPT-5.4 Oregon fallback (same model_name → router load-balances/fails over)
      - model_name: gpt-5.4
        litellm_params:
          model: openai/openai.gpt-5.4
          api_base: https://bedrock-mantle.us-west-2.api.aws/openai/v1
          api_key: os.environ/BEDROCK_MANTLE_API_KEY

    # ============================================================
    # Router Settings — least-busy routing + fallback
    # ============================================================
    router_settings:
      routing_strategy: least-busy    # Options: simple-shuffle | least-busy | latency-based-routing
      num_retries: 3
      retry_after: 5
      timeout: 600
      allowed_fails: 2
      cooldown_time: 60
      # Automatic fallback: if external provider fails, use Bedrock Claude
      # Note: gpt-5.5/gpt-5.4 use Responses API and cannot fallback to chat-only models
      fallbacks:
        - {"gemini-3.1-pro": ["claude-sonnet-4-6"]}
        - {"gemini-3-flash": ["claude-sonnet-4-6"]}

    # ============================================================
    # LiteLLM Core Settings
    # ============================================================
    litellm_settings:
      # Redis caching: reduces latency for repeated queries
      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: "6379"
        password: os.environ/REDIS_PASSWORD
        ssl: true
        ttl: 600               # Cache TTL in seconds
        supported_call_types:
          - acompletion
          - completion
          - embedding
      # Callbacks: must use "callbacks" (not success_callback) to enable handler instantiation
      callbacks:
        - "prometheus"
        - "websearch_interception"
      websearch_interception_params:
        enabled_providers:
          - bedrock
          - bedrock_converse
        search_tool_name: searxng-search
      # Request/response logging (set to false in prod if PII concern)
      set_verbose: false
      json_logs: true

    # ============================================================
    # Search Tools — SearXNG for WebSearch Interception
    # ============================================================
    search_tools:
      - search_tool_name: searxng-search
        litellm_params:
          search_provider: searxng
          api_base: http://searxng:8080

    # ============================================================
    # General / Proxy Settings
    # ============================================================
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      store_model_in_db: true
      database_connection_pool_limit: 10
      database_connection_timeout: 30
      allow_requests_on_db_unavailable: true
      # Share in-memory spend/budget state across all replicas via Redis
      redis_host: os.environ/REDIS_HOST
      redis_port: "6379"
      redis_password: os.environ/REDIS_PASSWORD
      redis_ssl: true
