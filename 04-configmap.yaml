apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    # ============================================================
    # Model List — add/remove providers as needed
    # ============================================================
    model_list:
      # ── AWS Bedrock Claude (IRSA, no API key needed) ──
      - model_name: bedrock-claude-sonnet46
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-6
          aws_region_name: us-east-1
      - model_name: bedrock-claude-sonnet45
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-5-20250929-v1:0
          aws_region_name: us-east-1
      - model_name: bedrock-claude-sonnet4
        litellm_params:
          model: bedrock/us.anthropic.claude-sonnet-4-20250514-v1:0
          aws_region_name: us-east-1
      - model_name: bedrock-claude-opus46
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-6-v1
          aws_region_name: us-east-1
      - model_name: bedrock-claude-opus45
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-5-20251101-v1:0
          aws_region_name: us-east-1
      - model_name: bedrock-claude-haiku45
        litellm_params:
          model: bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0
          aws_region_name: us-east-1
      - model_name: bedrock-claude-haiku35
        litellm_params:
          model: bedrock/us.anthropic.claude-3-5-haiku-20241022-v1:0
          aws_region_name: us-east-1

      # ── AWS Bedrock Nova ──
      - model_name: bedrock-nova-premier
        litellm_params:
          model: bedrock/us.amazon.nova-premier-v1:0
          aws_region_name: us-east-1
      - model_name: bedrock-nova-pro
        litellm_params:
          model: bedrock/us.amazon.nova-pro-v1:0
          aws_region_name: us-east-1
      - model_name: bedrock-nova-lite
        litellm_params:
          model: bedrock/us.amazon.nova-lite-v1:0
          aws_region_name: us-east-1
      - model_name: bedrock-nova-micro
        litellm_params:
          model: bedrock/us.amazon.nova-micro-v1:0
          aws_region_name: us-east-1

      # Azure OpenAI (key injected from Secrets Manager)
      - model_name: gpt-4o
        litellm_params:
          model: azure/gpt-4o
          api_base: os.environ/AZURE_API_BASE
          api_key: os.environ/AZURE_API_KEY

      # Google Gemini (API Key from Secrets Manager)
      - model_name: gemini-2.0-flash
        litellm_params:
          model: gemini/gemini-2.0-flash
          api_key: os.environ/GEMINI_API_KEY

      - model_name: gemini-2.5-pro
        litellm_params:
          model: gemini/gemini-2.5-pro-preview-05-06
          api_key: os.environ/GEMINI_API_KEY

      # OpenAI (API Key from Secrets Manager)
      - model_name: gpt-4o-openai
        litellm_params:
          model: openai/gpt-4o
          api_key: os.environ/OPENAI_API_KEY

      - model_name: o3-mini
        litellm_params:
          model: openai/o3-mini
          api_key: os.environ/OPENAI_API_KEY

    # ============================================================
    # Router Settings — least-busy routing + fallback
    # ============================================================
    router_settings:
      routing_strategy: least-busy    # Options: simple-shuffle | least-busy | latency-based-routing
      num_retries: 3
      retry_after: 5
      timeout: 600
      allowed_fails: 2
      cooldown_time: 60
      # Automatic fallback: if gpt-4o fails, use claude
      fallbacks:
        - {"gpt-4o": ["bedrock-claude-sonnet46"]}
        - {"gemini-2.0-flash": ["bedrock-claude-sonnet46"]}
        - {"gpt-4o-openai": ["bedrock-claude-sonnet46"]}

    # ============================================================
    # LiteLLM Core Settings
    # ============================================================
    litellm_settings:
      # Redis caching: reduces latency for repeated queries
      cache: true
      cache_params:
        type: redis
        host: os.environ/REDIS_HOST
        port: "6379"
        password: os.environ/REDIS_PASSWORD
        ssl: true
        ttl: 600               # Cache TTL in seconds
        supported_call_types:
          - acompletion
          - completion
          - embedding
      # Callbacks for observability
      success_callback: ["prometheus"]
      failure_callback: ["prometheus"]
      # Request/response logging (set to false in prod if PII concern)
      set_verbose: false
      json_logs: true

    # ============================================================
    # General / Proxy Settings
    # ============================================================
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      store_model_in_db: true
      database_connection_pool_limit: 10
      database_connection_timeout: 30
      allow_requests_on_db_unavailable: true
