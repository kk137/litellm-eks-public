# SearXNG — self-hosted meta search engine for WebSearch Interception
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: litellm
data:
  settings.yml: |
    use_default_settings: true

    general:
      instance_name: "SearXNG-LiteLLM"

    search:
      safe_search: 1
      default_lang: "all"
      formats:
        - html
        - json

    server:
      secret_key: "litellm-searxng-secret-2026"
      limiter: false
      image_proxy: false

    # Only keep engines that are stable under high-frequency AI calls
    engines:
      - name: google
        disabled: true          # Prone to CAPTCHA
      - name: bing
        disabled: true          # Prone to CAPTCHA
      - name: startpage
        disabled: true          # Rate-limited
      - name: duckduckgo
        disabled: false         # Primary engine - stable
      - name: wikipedia
        disabled: false         # Good for knowledge queries
      - name: brave
        disabled: false         # Friendly to automation
      - name: qwant
        disabled: false         # EU search engine, stable

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: litellm
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: searxng/searxng:latest
          env:
            - name: SEARXNG_PORT
              value: "8080"
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: searxng-config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: searxng-config
          configMap:
            name: searxng-config
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: litellm
spec:
  selector:
    app: searxng
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
